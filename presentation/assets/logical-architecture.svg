<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Fabric IQ Mini Hack logical architecture</title>
  <desc id="desc">Logical architecture showing user prompts flowing through the data agent into semantic, ontology, and technical layers backed by the lakehouse.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f4efe4"/>
      <stop offset="100%" stop-color="#e9f0f7"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="12" flood-color="#1c2f4a" flood-opacity="0.18"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#24415f"/>
    </marker>
    <style>
      .frame { fill: url(#bg); stroke: #24415f; stroke-width: 3; rx: 28; }
      .box { fill: #fffdfa; stroke: #24415f; stroke-width: 3; rx: 24; filter: url(#shadow); }
      .box-alt { fill: #fff7e6; stroke: #8d5b1f; stroke-width: 3; rx: 24; filter: url(#shadow); }
      .box-soft { fill: #edf5ff; stroke: #3f6a96; stroke-width: 3; rx: 24; filter: url(#shadow); }
      .lake { fill: #dbeef5; stroke: #27577a; stroke-width: 3; rx: 24; filter: url(#shadow); }
      .title { font: 700 38px 'Segoe UI Variable', 'Aptos', sans-serif; fill: #17324d; }
      .section { font: 700 28px 'Segoe UI Variable', 'Aptos', sans-serif; fill: #17324d; }
      .label { font: 700 24px 'Segoe UI Variable', 'Aptos', sans-serif; fill: #17324d; }
      .body { font: 500 20px 'Segoe UI Variable', 'Aptos', sans-serif; fill: #27455f; }
      .small { font: 600 18px 'Segoe UI Variable', 'Aptos', sans-serif; fill: #27455f; }
      .flow { stroke: #24415f; stroke-width: 4; fill: none; marker-end: url(#arrow); stroke-linecap: round; }
      .dashed { stroke-dasharray: 10 10; }
    </style>
  </defs>

  <rect x="16" y="16" width="1568" height="868" class="frame"/>
  <text x="800" y="68" text-anchor="middle" class="title">Fabric IQ Mini Hack: Logical Architecture</text>
  <text x="800" y="104" text-anchor="middle" class="body">From metric answers to AI-ready explanations in Microsoft Fabric</text>

  <rect x="540" y="132" width="520" height="120" class="box-alt"/>
  <text x="800" y="176" text-anchor="middle" class="section">Business Question</text>
  <text x="800" y="214" text-anchor="middle" class="body">What is happening, why is it happening, and what context should we trust?</text>

  <rect x="420" y="294" width="760" height="152" class="box"/>
  <text x="800" y="342" text-anchor="middle" class="section">Fabric Data Agent</text>
  <text x="800" y="380" text-anchor="middle" class="body">Natural language interface grounded in the ontology and semantic definitions</text>
  <text x="800" y="414" text-anchor="middle" class="small">Interprets prompts, applies business rules, and returns explainable answers</text>

  <rect x="120" y="520" width="380" height="176" class="box-soft"/>
  <text x="310" y="568" text-anchor="middle" class="label">Semantic Layer</text>
  <text x="310" y="606" text-anchor="middle" class="body">Spark SQL views and Power BI measures</text>
  <text x="310" y="640" text-anchor="middle" class="small">Defines reusable metrics and calculations</text>
  <text x="310" y="672" text-anchor="middle" class="small">Answers the what and how</text>

  <rect x="610" y="520" width="380" height="176" class="box-alt"/>
  <text x="800" y="568" text-anchor="middle" class="label">Ontology Layer</text>
  <text x="800" y="606" text-anchor="middle" class="body">Entities, relationships, business rules, classifications</text>
  <text x="800" y="640" text-anchor="middle" class="small">Adds domain meaning and behavioral context</text>
  <text x="800" y="672" text-anchor="middle" class="small">Answers the why</text>

  <rect x="1100" y="520" width="380" height="176" class="box-soft"/>
  <text x="1290" y="568" text-anchor="middle" class="label">Technical Layer</text>
  <text x="1290" y="606" text-anchor="middle" class="body">Lakehouse metadata, schema descriptions, profiling</text>
  <text x="1290" y="640" text-anchor="middle" class="small">Documents what exists and how it is organized</text>
  <text x="1290" y="672" text-anchor="middle" class="small">Improves discoverability and trust</text>

  <rect x="380" y="748" width="840" height="92" class="lake"/>
  <text x="800" y="797" text-anchor="middle" class="section">NYC Taxi Lakehouse</text>
  <text x="800" y="828" text-anchor="middle" class="body">Delta tables for trips, zones, payment types, rate codes, plus derived dimensions</text>

  <path d="M800 252 L800 292" class="flow"/>
  <path d="M800 446 L800 504" class="flow dashed"/>
  <path d="M800 446 C800 490 310 470 310 516" class="flow"/>
  <path d="M800 446 L800 516" class="flow"/>
  <path d="M800 446 C800 490 1290 470 1290 516" class="flow"/>
  <path d="M310 696 L310 744" class="flow"/>
  <path d="M800 696 L800 744" class="flow"/>
  <path d="M1290 696 L1290 744" class="flow"/>

  <text x="88" y="140" class="small">Outcome</text>
  <text x="88" y="170" class="body">Explainable analytics</text>
  <text x="88" y="202" class="body">for human and agent workflows</text>
</svg>